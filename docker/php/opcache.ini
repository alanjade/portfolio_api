; OPcache — significant performance boost for Laravel in production

opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.revalidate_freq=0       ; Never revalidate in production (files don't change)
opcache.validate_timestamps=0   ; Trust the cache — set to 1 only during debugging
opcache.save_comments=1         ; Required for Laravel annotations / Doctrine
opcache.fast_shutdown=1
