server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Render terminates SSL at the load balancer — trust X-Forwarded-Proto
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Forward Render headers to Laravel
        fastcgi_param  HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param  HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;

        fastcgi_read_timeout 120;
    }

    # Public storage (uploaded images)
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block dot-files and sensitive paths
    location ~ /\. {
        deny all;
    }
    location ~ /(\.env|composer\.(json|lock)|artisan) {
        deny all;
        return 404;
    }
}
